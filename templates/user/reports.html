<!DOCTYPE html>
<html>
<head>
<title>Annual Reports - Madurai Sevashram</title>

<style>

/* ===== PREMIUM NGO GRADIENT BACKGROUND ===== */
body{
 margin:0;
 font-family:"Segoe UI",system-ui,sans-serif;
 background:linear-gradient(120deg,#eef2ff,#e0f2fe,#f0fdfa,#fef9c3);
 background-size:400% 400%;
 animation:bgMove 16s ease infinite;
}
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* ===== NAVBAR ===== */
header{
 background:linear-gradient(90deg,#0b3c5d,#145a86);
 padding:18px;
 text-align:center;
 box-shadow:0 6px 18px rgba(0,0,0,.25);
}
header a{
 color:white;
 margin:0 18px;
 text-decoration:none;
 font-weight:700;
 font-size:18px;
 transition:.3s;
}
header a:hover{
 color:#ffd166;
 transform:scale(1.1);
}

/* ===== CONTAINER ===== */
.container{
 max-width:1000px;
 margin:auto;
 padding:60px 20px;
}

h2{
 text-align:center;
 font-size:42px;
 color:#0b3c5d;
 margin-bottom:45px;
 animation:fadeDown .8s ease;
}
@keyframes fadeDown{
 from{opacity:0; transform:translateY(-40px);}
 to{opacity:1; transform:translateY(0);}
}

/* ===== REPORT CARD ===== */
.card{
 background:rgba(255,255,255,.75);
 backdrop-filter:blur(10px);
 padding:30px;
 border-radius:20px;
 margin-bottom:45px;
 box-shadow:0 20px 40px rgba(0,0,0,.15);
 transition:.4s;
 animation:fadeUp .9s ease;
}
.card:hover{
 transform:translateY(-10px) scale(1.01);
}
@keyframes fadeUp{
 from{opacity:0; transform:translateY(40px);}
 to{opacity:1; transform:translateY(0);}
}

.card h3{
 font-size:30px;
 color:#0b3c5d;
 margin-bottom:20px;
}

/* ===== FILE LIST ===== */
.file-list{
 list-style:none;
 padding:0;
}

.file-list li{
 background:white;
 padding:15px 18px;
 margin-bottom:12px;
 border-radius:12px;
 box-shadow:0 6px 18px rgba(0,0,0,.12);
 display:flex;
 justify-content:space-between;
 align-items:center;
 transition:.3s;
}

.file-list li:hover{
 transform:scale(1.02);
}

/* ===== DOWNLOAD BUTTON ===== */
.download-btn{
 background:#0b3c5d;
 color:white;
 padding:8px 16px;
 border-radius:8px;
 text-decoration:none;
 font-weight:600;
 transition:.3s;
}

.download-btn:hover{
 background:#145a86;
}

/* EMPTY */
.empty{
 text-align:center;
 font-size:22px;
 color:#64748b;
 padding:40px;
}

</style>
</head>

<body>

<header>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/events">Events</a>
<a href="/gallery">Gallery</a>
<a href="/reports">Reports</a>
<a href="/contact">Contact</a>
</header>

<div class="container">
<h2>Annual Reports</h2>

{% for r in reports %}
<div class="card">

<h3>{{ r.year }}</h3>

{% if r.file %}
<ul class="file-list">
{% for f in r.file.split(',') %}
<li>
<span>{{ f.split('/')[-1] }}</span>
<a class="download-btn"
   href="{{ url_for('static', filename='uploads/reports/' + f) }}"
   target="_blank">
Download
</a>
</li>
{% endfor %}
</ul>
{% else %}
<div class="empty">No files available</div>
{% endif %}

</div>

{% else %}
<div class="empty">No reports uploaded</div>
{% endfor %}
</div>

</body>
</html>
