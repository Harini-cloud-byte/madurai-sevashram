<!DOCTYPE html>
<html>
<head>
<title>Contact - Madurai Sevashram</title>

<style>
body{
 margin:0;
 font-family:"Segoe UI",system-ui,sans-serif;
 background:linear-gradient(120deg,#eef2ff,#e0f2fe,#f0fdfa,#fef9c3);
 background-size:400% 400%;
 animation:bgMove 16s ease infinite;
 overflow-x:hidden;
}

/* 🌈 background animation */
@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🌟 floating blobs */
body::before, body::after{
 content:"";
 position:fixed;
 width:300px;
 height:300px;
 border-radius:50%;
 filter:blur(100px);
 z-index:-1;
}
body::before{
 background:#7dd3fc;
 top:10%;
 left:5%;
}
body::after{
 background:#facc15;
 bottom:10%;
 right:5%;
}

/* HEADER */
header{
 background:linear-gradient(90deg,#0b3c5d,#145a86);
 padding:18px;
 text-align:center;
 box-shadow:0 6px 18px rgba(0,0,0,.25);
}

header a{
 color:white;
 margin:0 18px;
 text-decoration:none;
 font-weight:700;
 font-size:18px;
 position:relative;
}

/* ✨ underline animation */
header a::after{
 content:"";
 position:absolute;
 width:0%;
 height:2px;
 background:#ffd166;
 left:0;
 bottom:-5px;
 transition:.3s;
}
header a:hover::after{
 width:100%;
}

/* CONTAINER */
.container{
 max-width:700px;
 margin:auto;
 padding:80px 20px;
 animation:fadeUp 1s ease;
}

@keyframes fadeUp{
 from{opacity:0; transform:translateY(40px);}
 to{opacity:1; transform:translateY(0);}
}

/* CARD */
.card{
 background:rgba(255,255,255,.75);
 backdrop-filter:blur(15px);
 padding:40px;
 border-radius:20px;
 box-shadow:0 25px 50px rgba(0,0,0,.2);
 display:flex;
 flex-direction:column;
 gap:20px;
 transition:.3s;
}
.card:hover{
 transform:scale(1.02);
}

/* INPUTS */
input, textarea{
 padding:14px 16px;
 border-radius:10px;
 border:1px solid #cbd5f5;
 font-size:16px;
 outline:none;
 transition:.3s;
}

input:focus, textarea:focus{
 border-color:#0b3c5d;
 box-shadow:0 0 10px rgba(11,60,93,.3);
 transform:scale(1.02);
}

/* TEXTAREA */
textarea{
 resize:none;
 height:120px;
}

/* BUTTON */
button{
 background:linear-gradient(90deg,#0b3c5d,#145a86);
 color:white;
 padding:14px;
 border:none;
 border-radius:10px;
 font-size:17px;
 font-weight:600;
 cursor:pointer;
 position:relative;
 overflow:hidden;
 transition:.3s;
}

/* glow */
button:hover{
 transform:scale(1.05);
 box-shadow:0 10px 25px rgba(11,60,93,.4);
}

/* ripple effect */
button::after{
 content:"";
 position:absolute;
 width:0;
 height:0;
 background:rgba(255,255,255,.5);
 border-radius:50%;
 transform:translate(-50%,-50%);
 top:50%;
 left:50%;
 transition:.6s;
}
button:active::after{
 width:300px;
 height:300px;
}

/* TITLE */
.page-title{
 text-align:center;
 font-size:38px;
 color:#0b3c5d;
 margin-bottom:25px;
 animation:fadeUp 1s ease;
}

/* FLASH */
.flash{
 text-align:center;
 background:#dcfce7;
 color:#166534;
 padding:12px;
 border-radius:10px;
 margin-bottom:20px;
 font-weight:600;
 animation:fadeUp 0.8s ease;
}
</style>
</head>

<body>

<header>
<a href="/">Home</a>
<a href="/about">About</a>
<a href="/events">Events</a>
<a href="/gallery">Gallery</a>
<a href="/reports">Reports</a>
<a href="/contact">Contact</a>
</header>

<div class="container">

<h2 class="page-title">Send Feedback</h2>

<!-- FLASH MESSAGE -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash">{{ messages[0] }}</div>
  {% endif %}
{% endwith %}

<form method="post" class="card">

<input name="name" placeholder="Your Name" required>
<input name="email" type="email" placeholder="Your Email" required>
<input name="phone" type="tel" placeholder="Your Phone Number" required>

<textarea name="message" placeholder="Write your message..." required></textarea>

<button type="submit">Send Message</button>

</form>
</div>

</body>
</html>
