<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<!-- Body font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- Header font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(
        135deg,
        #f1f5f9,
        #e0f2fe,
        #ede9fe,
        #ecfeff
    );
    background-size: 300% 300%;
    animation: softFlow 30s ease infinite;
    display:flex;
    flex-direction:column;
}

@keyframes softFlow{
    0%   {background-position:0% 50%;}
    50%  {background-position:100% 50%;}
    100% {background-position:0% 50%;}
}

header{
    display:flex;
    justify-content:center;
    padding:32px;
}

.header-box{
    background:linear-gradient(
        135deg,
        #1e293b,
        #0f172a
    );
    padding:20px 60px;
    border-radius:18px;
    box-shadow:0 14px 30px rgba(0,0,0,.25);
    animation: headerFade 1s ease;
}

@keyframes headerFade{
    from{
        opacity:0;
        transform:translateY(-15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.header-box h2{
    font-family:'Playfair Display', serif;
    font-size:36px;
    font-weight:700;
    color:#f8fafc;
    letter-spacing:1.4px;
}

.login-wrapper{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
}

.login-card{
    width:380px;
    background:rgba(255,255,255,0.98);
    padding:48px 40px;
    border-radius:16px;
    box-shadow:
        0 24px 50px rgba(0,0,0,.12),
        0 10px 22px rgba(0,0,0,.08);
    animation: cardFade .9s ease;
}

@keyframes cardFade{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.login-card h3{
    text-align:center;
    margin-bottom:34px;
    color:#1e3a8a;
    font-size:26px;
    font-weight:700;
}

.input-group{
    margin-bottom:26px;
}

.input-group input{
    width:100%;
    padding:18px;
    font-size:18px;
    border-radius:10px;
    border:1px solid #c7d2fe;
    outline:none;
    background:#fff;
    transition:all .2s ease;
}

.input-group input:focus{
    border-color:#2563eb;
    box-shadow:0 0 0 5px rgba(37,99,235,.15);
}

.login-btn{
    width:100%;
    padding:18px;
    margin-top:14px;
    background:#1e40af;
    border:none;
    color:#fff;
    font-size:18px;
    font-weight:600;
    border-radius:32px;
    cursor:pointer;
    transition:background .2s, transform .1s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.login-btn:active{
    transform:translateY(1px);
}
</style>
</head>

<body>

<header>
    <div class="header-box">
        <h2>Madurai Sevashram</h2>
    </div>
</header>

<div class="login-wrapper">
    <form method="post" class="login-card" autocomplete="off">
        <h3>Login</h3>

        <div class="input-group">
            <input type="text" name="username" placeholder="Username" autocomplete="off" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" autocomplete="new-password" required>
        </div>

        <button class="login-btn">Sign in</button>
    </form>
</div>

<!-- Force Clear Script -->
<script>
window.addEventListener("pageshow", function () {
    const form = document.querySelector(".login-card");
    form.reset();

    document.querySelector("input[name='username']").value = "";
    document.querySelector("input[name='password']").value = "";
});
</script>

</body>
</html>
