<!DOCTYPE html>
<html>
<head>
    <title>Add Gallery Images</title>
    <link rel="stylesheet" href="/static/css/style.css">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #f1f8ff);
            min-height: 100vh;
            animation: fadeIn 1s ease-in;
        }

        header {
            background: linear-gradient(90deg, #0b3c5d, #145a86);
            color: white;
            padding: 20px;
            text-align: center;
            box-shadow: 0 5px 12px rgba(0,0,0,0.18);
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 40px;
            align-items: start;
        }

        /* FORM CARD */
        .form-card {
            animation: slideUp 0.8s ease-out;
        }

        /* PREVIEW GRID */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
            animation: slideUp 1s ease-out;
        }

        .preview-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.25);
            transition: transform 0.3s ease;
        }

        .preview-card:hover {
            transform: translateY(-6px);
        }

        .preview-card img {
            width: 100%;
            height: 300px;            /* 🔥 LARGE IMAGE */
            object-fit: cover;        /* SAME SIZE */
            background: #f0f0f0;
        }

        .preview-info {
            padding: 14px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            color: #0b3c5d;
            background: #f9fbfd;
        }

        input {
            border-radius: 6px;
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }

        input:focus {
            outline: none;
            border-color: #0b3c5d;
            box-shadow: 0 0 6px rgba(11,60,93,0.35);
        }

        .hint {
            font-size: 13px;
            color: #555;
            margin-top: 5px;
        }

        button {
            width: 100%;
            margin-top: 20px;
            font-size: 17px;
            padding: 10px;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #072a40;
            transform: scale(1.03);
        }

        .back-link {
            text-align: center;
            margin: 30px 0;
        }

        .back-link a {
            text-decoration: none;
            color: #0b3c5d;
            font-weight: 600;
            font-size: 16px;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(35px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h2>Madurai Sevashram – Add Gallery Images</h2>
</header>

<div class="container">

    <!-- FORM -->
    <form method="post" enctype="multipart/form-data" class="card form-card">
        <h3 style="text-align:center; color:#0b3c5d;">Gallery Details</h3>

        <input type="text" name="category" id="category"
               placeholder="Category (Health Camp, Education)" required>

        <label><strong>Select Images</strong></label>
        <input type="file" name="images" id="imageInput" accept="image/*" multiple required>

        <div class="hint">You can select multiple images (Ctrl / Shift)</div>

        <button type="submit">Add Images</button>
    </form>

    <!-- MULTIPLE IMAGE PREVIEW -->
    <div class="preview-grid" id="previewGrid">
        <!-- Preview cards appear here -->
    </div>

</div>

<div class="back-link">
    <a href="/admin/gallery">← Back to Gallery</a>
</div>

<script>
    const imageInput = document.getElementById("imageInput");
    const previewGrid = document.getElementById("previewGrid");
    const categoryInput = document.getElementById("category");

    imageInput.addEventListener("change", function () {
        previewGrid.innerHTML = "";
        const files = this.files;

        for (let i = 0; i < files.length; i++) {
            const card = document.createElement("div");
            card.className = "preview-card";

            const img = document.createElement("img");
            img.src = URL.createObjectURL(files[i]);

            const info = document.createElement("div");
            info.className = "preview-info";
            info.textContent = categoryInput.value || "Gallery Image";

            card.appendChild(img);
            card.appendChild(info);
            previewGrid.appendChild(card);
        }
    });

    categoryInput.addEventListener("input", function () {
        document.querySelectorAll(".preview-info").forEach(info => {
            info.textContent = this.value || "Gallery Image";
        });
    });
</script>

</body>
</html>
