<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Inter',system-ui,sans-serif;
        }

        body{
            min-height:100vh;
            background: linear-gradient(135deg,#f1f5f9,#e0f2fe,#ede9fe,#f8fafc);
        }

        header{
            background:linear-gradient(135deg,#0f172a,#1e293b);
            color:white;
            padding:26px;
            text-align:center;
        }

        header h2{
            font-size:30px;
            font-weight:700;
        }

        nav{
            margin-top:14px;
        }

        nav a{
            color:#e5e7eb;
            margin:0 14px;
            text-decoration:none;
            font-weight:600;
        }

        nav a:hover{
            color:#ffffff;
            text-decoration:underline;
        }

        .chart-container{
            max-width:900px;
            margin:50px auto;
            background:white;
            padding:34px;
            border-radius:22px;
            box-shadow:0 18px 40px rgba(0,0,0,.15);
        }

        .chart-container h3{
            text-align:center;
            margin-bottom:18px;
        }

        form input, form textarea{
            width:100%;
            padding:10px;
            margin-top:6px;
            margin-bottom:12px;
            border-radius:8px;
            border:1px solid #cbd5e1;
        }

        form button{
            background:#1e40af;
            color:white;
            padding:12px;
            border:none;
            border-radius:10px;
            cursor:pointer;
            font-weight:600;
        }

        form button:hover{
            background:#2563eb;
        }

        .flash{
            max-width:900px;
            margin:20px auto;
            padding:12px;
            background:#dcfce7;
            color:#166534;
            border-radius:10px;
            text-align:center;
            font-weight:600;
        }
    </style>
</head>

<body>

<header>
    <h2>Management Overview</h2>
    <p>Madurai Sevashram – Activity & Data Summary</p>

    <nav>
        <a href="/admin/events">Events</a>
        <a href="/admin/reports">Reports</a>
        <a href="/admin/gallery">Gallery</a>
        <a href="/admin/feedback">Feedback</a>
        <a href="/logout">Logout</a>
    </nav>
</header>

<!-- FLASH -->
{% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="flash">{{ messages[0] }}</div>
  {% endif %}
{% endwith %}

<!-- YEARLY CHART ONLY -->
<div class="chart-container">
    <h3>Events Per Year</h3>
    <canvas id="yearlyChart"></canvas>
</div>

<!-- HOME SETTINGS -->
<div class="chart-container">
    <h3>Edit Home Page</h3>

    <form method="POST" action="/admin/update-home">

        <label>Title</label>
        <input type="text" name="title" value="{{ home.title }}" required>

        <label>Description</label>
        <textarea name="description" required>{{ home.description }}</textarea>

        <label>Background Color</label>
        <input type="color" name="bgcolor" value="{{ home.bgcolor }}">

        <label>Text Color</label>
        <input type="color" name="textcolor" value="{{ home.textcolor }}">

        <button type="submit">Save Changes</button>

    </form>
</div>

<script>
    new Chart(document.getElementById('yearlyChart'), {
        type:'bar',
        data:{
            labels:{{ years | tojson }},
            datasets:[{
                label:'Events',
                data:{{ yearly_event_counts | tojson }},
                backgroundColor:'#2563eb'
            }]
        }
    });
</script>

</body>
</html>
