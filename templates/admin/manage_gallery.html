<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gallery Management</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',system-ui,sans-serif;
}

/* ---------- BACKGROUND ---------- */
body{
    min-height:100vh;
    background: linear-gradient(
        135deg,
        #f1f5f9,
        #e0f2fe,
        #ede9fe,
        #f8fafc
    );
    background-size:300% 300%;
    animation:bgFlow 30s ease infinite;
    display:flex;
    justify-content:center;
    align-items:flex-start;
}

@keyframes bgFlow{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

/* ---------- MAIN CONTAINER ---------- */
.container{
    width:100%;
    max-width:1000px;
    margin-top:50px;
    background:rgba(255,255,255,.97);
    padding:42px;
    border-radius:24px;
    box-shadow:0 25px 50px rgba(0,0,0,.15);
    animation:fadeUp .8s ease;
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ---------- HEADER ---------- */
.container h2{
    text-align:center;
    font-size:34px;
    font-weight:700;
    color:#1e293b;
    margin-bottom:32px;
}

/* ---------- ADD BUTTON ---------- */
.add-btn{
    display:block;
    margin:0 auto 38px auto;
    padding:16px 34px;
    background:linear-gradient(135deg,#1e40af,#2563eb);
    color:white;
    border:none;
    border-radius:35px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    letter-spacing:.3px;
    transition:all .25s ease;
}

.add-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 30px rgba(37,99,235,.35);
}

/* ---------- GRID ---------- */
.gallery-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
    gap:28px;
}

/* ---------- CARD ---------- */
.card{
    background:white;
    padding:20px;
    border-radius:20px;
    box-shadow:0 14px 30px rgba(0,0,0,.12);
    text-align:center;
    transition:all .25s ease;
    animation:cardSlide .6s ease;
}

@keyframes cardSlide{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 24px 48px rgba(0,0,0,.18);
}

/* ---------- IMAGE ---------- */
.card img{
    width:100%;
    height:190px;
    object-fit:cover;
    border-radius:16px;
    margin-bottom:16px;
}

/* ---------- CATEGORY ---------- */
.card p{
    font-size:16px;
    font-weight:600;
    color:#475569;
    margin-bottom:18px;
}

/* ---------- ACTION BUTTONS ---------- */
.actions{
    display:flex;
    justify-content:center;
    gap:14px;
}

/* ---------- BASE ACTION BUTTON ---------- */
.action-btn{
    padding:10px 22px;
    font-size:16px;
    font-weight:700;
    border-radius:30px;
    text-decoration:none;
    letter-spacing:.4px;
    transition:all .25s ease;
    box-shadow:0 6px 16px rgba(0,0,0,.15);
}

/* ---------- EDIT ---------- */
.edit-btn{
    background:linear-gradient(135deg,#2563eb,#3b82f6);
    color:white;
}

.edit-btn:hover{
    transform:translateY(-2px) scale(1.04);
    box-shadow:0 14px 30px rgba(37,99,235,.45);
}

/* ---------- DELETE ---------- */
.delete-btn{
    background:linear-gradient(135deg,#dc2626,#ef4444);
    color:white;
}

.delete-btn:hover{
    transform:translateY(-2px) scale(1.04);
    box-shadow:0 14px 30px rgba(220,38,38,.45);
}
</style>
</head>

<body>

<div class="container">
    <h2>Gallery Management</h2>

    <a href="/admin/add-gallery">
        <button class="add-btn">➕ Add Image</button>
    </a>

    <div class="gallery-grid">
        {% for i in images %}
        <div class="card">
            <img src="/static/uploads/gallery/{{ i.image }}" alt="Gallery image">
            <p>{{ i.category }}</p>

            <div class="actions">
                <a href="/admin/edit-gallery/{{ i.id }}" class="action-btn edit-btn">Edit</a>
                <a href="/admin/delete-gallery/{{ i.id }}" 
                   class="action-btn delete-btn" 
                   onclick="return confirmDelete()">Delete</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<script>
function confirmDelete(){
    return confirm("Are you sure you want to delete this image?");
}
</script>

</body>
</html>
